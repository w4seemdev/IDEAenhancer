<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#141019"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0" r="0.8">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="headline" x1="80" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d8b4fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="629" rx="0" stroke="#262626" stroke-width="1"/>

  <!-- Brand row: spark mark + wordmark -->
  <g transform="translate(80, 96)">
    <g stroke="#a78bfa" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M22 4v8M22 32v8M4 22h8M32 22h8M9 9l5.6 5.6M29.4 29.4 35 35M35 9l-5.6 5.6M14.6 29.4 9 35"/>
      <circle cx="22" cy="22" r="7"/>
    </g>
    <text x="58" y="33" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="30" font-weight="700" fill="#f5f5f5">Idea Enhancer</text>
  </g>

  <!-- Headline -->
  <text x="80" y="300" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="76" font-weight="800" fill="url(#headline)">Type a small idea.</text>
  <text x="80" y="392" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="76" font-weight="800" fill="#a78bfa">Get four bigger, better ones.</text>

  <!-- Subhead -->
  <text x="80" y="452" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="30" font-weight="400" fill="#a3a3a3">Focused · 10x · Contrarian · Money Maker · one line in, four concepts out.</text>

  <!-- Direction chips -->
  <g font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="30">
    <g transform="translate(80, 510)">
      <rect width="170" height="64" rx="32" fill="#10b98122" stroke="#10b98155"/>
      <text x="32" y="42" fill="#e5e5e5">🎯 Focus</text>
    </g>
    <g transform="translate(266, 510)">
      <rect width="150" height="64" rx="32" fill="#8b5cf622" stroke="#8b5cf655"/>
      <text x="30" y="42" fill="#e5e5e5">🚀 10x</text>
    </g>
    <g transform="translate(432, 510)">
      <rect width="210" height="64" rx="32" fill="#f59e0b22" stroke="#f59e0b55"/>
      <text x="30" y="42" fill="#e5e5e5">🤿 Contrarian</text>
    </g>
    <g transform="translate(658, 510)">
      <rect width="230" height="64" rx="32" fill="#f43f5e22" stroke="#f43f5e55"/>
      <text x="30" y="42" fill="#e5e5e5">💰 Money Maker</text>
    </g>
  </g>
</svg>
